services:
  fastapi:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: rag_fastapi
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag_internal
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`rag.shikharjain.com`)"
      - "traefik.http.routers.fastapi.tls=true"
      - "traefik.http.routers.fastapi.entrypoints=web,websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=mytlschallenge"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
      - "traefik.docker.network=n8n_default"

  postgres:
    image: postgres:16-alpine
    command: postgres -c ssl=off
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    restart: unless-stopped
    environment:
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_internal
    mem_limit: 2g

networks:
  rag_internal:
    driver: bridge
  n8n_default:
    external: true

volumes:
  postgres_data:
  qdrant_data:
